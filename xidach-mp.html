<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VTWorld — Xì Dách Online</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="quests.css"/>
  <link rel="stylesheet" href="cards.css"/>
  <script type="module" src="quests.js"></script>
  <style>
    /* ===================== LAYOUT ===================== */
    .xd-wrap { min-height:100vh; padding:14px 12px 40px; max-width:900px; margin:0 auto; position:relative; z-index:1; }
    .xd-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; flex-wrap:wrap; gap:8px; }
    .xd-room { font-family:'Orbitron',monospace; color:#34d399; font-weight:900; font-size:14px; padding:6px 14px; border-radius:999px; background:rgba(52,211,153,.1); border:1px solid rgba(52,211,153,.4); }
    .xd-back { background:none; border:none; color:#34d399; font-weight:800; font-size:13px; cursor:pointer; font-family:'Nunito',sans-serif; }

    .xd-bank { display:flex; justify-content:space-between; align-items:center; padding:11px 16px; border-radius:14px; background:linear-gradient(135deg,rgba(251,191,36,.15),rgba(245,158,11,.05)); border:1px solid rgba(251,191,36,.4); margin-bottom:14px; }
    .xd-bank-l { color:#fef3c7; font-weight:700; font-size:13px; }
    .xd-bank-r { color:#fbbf24; font-weight:900; font-size:18px; font-family:'Orbitron',monospace; }

    .xd-phase { text-align:center; padding:12px; border-radius:14px; margin-bottom:14px; font-weight:800; font-size:14px; background:rgba(56,189,248,.08); color:#7dd3fc; border:1px solid rgba(56,189,248,.25); }

    .xd-table { display:flex; flex-direction:column; gap:10px; margin-bottom:14px; }

    /* ===================== GHẾ ===================== */
    .xd-seat { position:relative; padding:10px 12px; border-radius:14px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.06); transition:all .25s; }
    .xd-seat.turn { 
      background:linear-gradient(135deg,rgba(251,191,36,.15),rgba(251,146,60,.06)); 
      border-color:rgba(251,191,36,.55); 
      box-shadow:0 0 20px rgba(251,191,36,.2);
      animation: seatPulse 1s ease-in-out infinite alternate;
    }
    @keyframes seatPulse {
      from { box-shadow: 0 0 15px rgba(251,191,36,0.2); }
      to { box-shadow: 0 0 30px rgba(251,191,36,0.5); }
    }
    .xd-seat.win { background:linear-gradient(135deg,rgba(52,211,153,.18),rgba(5,150,105,.05)); border-color:rgba(52,211,153,.5); }
    .xd-seat.lose { background:rgba(248,113,113,.07); border-color:rgba(248,113,113,.35); opacity:.85; }

    /* Nhà cái */
    .xd-seat.dealer {
      background:linear-gradient(135deg,rgba(167,139,250,0.2),rgba(124,58,237,0.1));
      border:2px solid #fbbf24;
      box-shadow:0 0 18px rgba(251,191,36,0.35);
    }
    .xd-seat.dealer .xd-seat-name { font-size:16px; font-weight:900; color:#fbbf24; text-shadow:0 0 6px rgba(251,191,36,0.7); }

    /* Ghế bản thân */
    .xd-seat.me {
      background:linear-gradient(135deg,rgba(251,191,36,.12),rgba(245,158,11,.06));
      border:1px solid rgba(251,191,36,.4);
      box-shadow:0 4px 20px rgba(0,0,0,.3);
    }

    .xd-seat-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; flex-wrap:wrap; gap:4px; }
    .xd-seat-name { font-weight:800; color:#e0f2fe; font-size:14px; }

    /* Điểm inline cạnh tên */
    .xd-score-inline {
      font-family: 'Orbitron', monospace;
      font-weight: 900; font-size: 16px;
      color: #fbbf24;
      background: rgba(0,0,0,0.5);
      padding: 1px 8px; border-radius: 8px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .xd-seat.dealer .xd-score-inline { color: #fbbf24; background: rgba(0,0,0,0.6); }

    /* ===================== LÁ BÀI ===================== */
    .xd-cards {
      display: flex;
      flex-wrap: nowrap;
      align-items: flex-start;
      padding: 2px 0;
      overflow: hidden;
      min-height: 80px;
    }

    .xd-cards .card {
      background: none !important;
      background-color: transparent !important;
      aspect-ratio: unset !important;
      min-height: unset !important;
      height: auto !important;
      border-radius: 5px !important;
    }

    /* Người chơi khác */
    .xd-cards .card { width: 44px !important; margin-left: -16px !important; }
    .xd-cards .card:first-child { margin-left: 0 !important; }

    /* Nhà cái */
    .xd-seat.dealer .xd-cards .card { width: 52px !important; margin-left: -20px !important; }
    .xd-seat.dealer .xd-cards .card:first-child { margin-left: 0 !important; }

    /* Bản thân */
    .xd-seat.me .xd-cards .card { width: 62px !important; margin-left: -24px !important; }
    .xd-seat.me .xd-cards .card:first-child { margin-left: 0 !important; }

    /* Nhà cái + me */
    .xd-seat.dealer.me .xd-cards .card { width: 62px !important; margin-left: -24px !important; }
    .xd-seat.dealer.me .xd-cards .card:first-child { margin-left: 0 !important; }

    .xd-seat:not(.me):not(.dealer) { padding: 7px 10px; }

    /* ===================== TIỀN CƯỢC (GÓC DƯỚI PHẢI) ===================== */
    .xd-bet-badge {
      position: absolute;
      bottom: 10px; right: 12px;
      padding: 4px 12px;
      border-radius: 8px;
      border: 1px solid rgba(251,191,36,0.5);
      background: rgba(251,191,36,0.12);
      color: #fbbf24;
      font-family: 'Orbitron', monospace;
      font-weight: 900; font-size: 12px;
      pointer-events: none;
    }

    /* ===================== NÚT XÉT BÀI NEON ===================== */
    .xd-check-btn-neon {
      position: absolute;
      top: 8px; right: 10px;
      padding: 5px 14px;
      border-radius: 8px;
      border: none;
      background: #ef4444;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-weight: 800; font-size: 12px;
      cursor: pointer;
      box-shadow: 0 0 15px #ef4444, 0 0 30px rgba(239,68,68,0.6);
      text-shadow: 0 0 5px rgba(255,255,255,0.5);
      animation: neonPulse 0.8s infinite alternate;
      z-index: 30;
    }
    @keyframes neonPulse {
      from { box-shadow: 0 0 10px #ef4444, 0 0 20px rgba(239,68,68,0.4); }
      to { box-shadow: 0 0 25px #ef4444, 0 0 50px rgba(239,68,68,0.8); }
    }

    /* ===================== KẾT QUẢ NEON TO GIỮA BÀI ===================== */
    .xd-result-overlay {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: 20px;
      white-space: nowrap;
      padding: 10px 20px;
      border-radius: 12px;
      pointer-events: none;
      animation: popResult .45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      line-height: 1.3;
      text-align: center;
    }
    @keyframes popResult {
      0%   { transform: translate(-50%,-50%) scale(0.4); opacity: 0; }
      100% { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
    }

    .xd-result-win {
      background: rgba(34, 197, 94, 0.9);
      color: #fff;
      box-shadow: 0 0 30px #22c55e, 0 0 60px rgba(34, 197, 94, 0.5);
      text-shadow: 0 0 10px #fff, 0 0 20px #22c55e;
    }
    .xd-result-lose {
      background: rgba(239, 68, 68, 0.9);
      color: #fff;
      box-shadow: 0 0 30px #ef4444, 0 0 60px rgba(239, 68, 68, 0.5);
      text-shadow: 0 0 10px #fff, 0 0 20px #ef4444;
    }
    .xd-result-draw {
      background: rgba(148, 163, 184, 0.9);
      color: #fff;
      box-shadow: 0 0 30px #94a3b8, 0 0 60px rgba(148, 163, 184, 0.5);
      text-shadow: 0 0 10px #fff, 0 0 20px #94a3b8;
    }
    .xd-result-special {
      background: linear-gradient(45deg, #facc15, #fb923c);
      color: #000;
      box-shadow: 0 0 40px #facc15, 0 0 80px rgba(250, 204, 21, 0.6);
      text-shadow: 0 0 10px #000, 0 0 20px #fbbf24;
    }
    .xd-result-bust {
      background: rgba(239, 68, 68, 0.9);
      color: #fff;
      box-shadow: 0 0 30px #ef4444, 0 0 60px rgba(239, 68, 68, 0.5);
      text-shadow: 0 0 10px #fff, 0 0 20px #ef4444;
    }

    /* Ẩn các thành phần cũ */
    .xd-seat-meta { display: none !important; }
    .xd-bet-badge-old { display: none !important; }
    .xd-turn-tag  { display: none !important; }

    /* ===================== ĐẶT CƯỢC & ACTIONS ===================== */
    .xd-bet-row { display:flex; gap:8px; align-items:center; margin-bottom:14px; flex-wrap:wrap; justify-content:center; }
    .xd-bet-row label { color:#cbd5e1; font-weight:700; font-size:13px; }
    .xd-bet-row input { width:120px; padding:8px 12px; border-radius:10px; border:1px solid rgba(56,189,248,.3); background:rgba(0,0,0,.3); color:#e0f2fe; font-family:'Orbitron',monospace; font-weight:800; text-align:center; }
    .xd-bet-row button { padding:8px 16px; border-radius:10px; border:none; cursor:pointer; font-weight:800; font-family:'Nunito',sans-serif; font-size:13px; background:linear-gradient(135deg,#34d399,#059669); color:#fff; }

    .xd-actions { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    .xd-actions button { padding:11px 20px; border-radius:12px; border:none; cursor:pointer; font-weight:800; font-family:'Nunito',sans-serif; font-size:13px; }
    .btn-hit  { background:linear-gradient(135deg,#38bdf8,#0ea5e9); color:#fff; }
    .btn-stand{ background:linear-gradient(135deg,#a78bfa,#7c3aed); color:#fff; }
    .btn-deal { background:linear-gradient(135deg,#34d399,#059669); color:#fff; }
    .btn-leave-xd { background:rgba(248,113,113,.12); color:#f87171; border:1px solid rgba(248,113,113,.3) !important; }
    .xd-actions button:disabled { opacity:.5; cursor:not-allowed; }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="xd-wrap">
    <div class="xd-head">
      <button class="xd-back" onclick="quitGame()">← Rời phòng</button>
      <div class="logo" style="cursor:pointer" onclick="location.href='index.html'"><span class="logo-vt">VT</span><span class="logo-world">World</span></div>
      <span class="xd-room" id="xd-room">#------</span>
    </div>

    <div class="xd-bank">
      <span class="xd-bank-l">💰 Số dư của bạn</span>
      <span class="xd-bank-r" id="xd-balance">0 đ</span>
    </div>

    <div class="xd-phase" id="xd-phase">Đang tải...</div>

    <div class="xd-bet-row" id="xd-bet-row" style="display:none">
      <label>Đặt cược:</label>
      <input id="xd-bet-input" type="number" min="50" step="50" value="100"/>
      <button onclick="placeBet()">✅ Đặt cược</button>
    </div>

    <div class="xd-table" id="xd-table"></div>

    <div class="xd-actions">
      <button class="btn-hit"   id="btn-hit"        onclick="hit()"           style="display:none">➕ Rút</button>
      <button class="btn-stand" id="btn-stand"      onclick="stand()"         style="display:none">✋ Dằn</button>
      <button class="btn-deal"  id="btn-deal"       onclick="hostDeal()"      style="display:none">🃏 Chia bài</button>
      <button class="btn-deal"  id="btn-next-round" onclick="hostNextRound()" style="display:none">▶ Vòng mới</button>
      <button class="btn-leave-xd" onclick="quitGame()">🚪 Rời phòng</button>
    </div>
  </div>

  <div id="toastContainer" style="position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none"></div>
  <script>
    const canvas = document.getElementById('bg-canvas'); const ctx = canvas.getContext('2d'); let particles = [];
    function resize(){canvas.width=innerWidth;canvas.height=innerHeight}resize();addEventListener('resize',resize);
    for(let i=0;i<25;i++)particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*1.5+.5});
    (function loop(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(52,211,153,0.4)';ctx.fill()});requestAnimationFrame(loop)})();
    window.showToast=function(msg,type='info'){const c={info:'#38bdf8',success:'#34d399',warn:'#fbbf24',error:'#f87171'};const t=document.createElement('div');t.style.cssText=`pointer-events:all;padding:11px 16px;border-radius:12px;background:rgba(4,20,40,0.97);border:1px solid ${c[type]};color:#e0f2fe;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;box-shadow:0 8px 32px rgba(0,0,0,0.5);max-width:280px`;t.innerHTML=msg;toastContainer.appendChild(t);setTimeout(()=>t.remove(),3500)};
  </script>
  <script type="module" src="xidach-mp.js"></script>
</body>
</html>
