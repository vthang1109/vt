<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VTWorld — Cửa Hàng</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="shop.css"/>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <nav>
    <div class="logo" onclick="location.href='index.html'" style="cursor:pointer">
      <span class="logo-vt">VT</span><span class="logo-world">World</span>
    </div>
    
    <!-- Nút 3 gạch với Bag + Quay lại -->
    <div class="nav-right-menu">
      <button class="nav-hamburger" onclick="toggleNavMenu()">☰</button>
      <div class="nav-dropdown" id="navDropdown">
        <a class="nav-dropdown-item" href="bag.html">
          <span class="dd-icon">🎒</span> Bag
        </a>
        <a class="nav-dropdown-item" href="#" onclick="history.back();return false;">
          <span class="dd-icon">←</span> Quay lại
        </a>
      </div>
    </div>
  </nav>

  <div class="shop-wrap">
    <div class="shop-hero">
      <h1>🛒 <span>Cửa</span> Hàng</h1>
      <p>Gacha · Thú Cưng · Trang Phục</p>
    </div>

    <div class="shop-tabs">
      <button class="shop-tab active" data-tab="pets">🐾 Thú Cưng</button>
      <button class="shop-tab" data-tab="outfits">👕 Trang Phục</button>
    </div>

    <div class="shop-grid" id="shopGrid"></div>
  </div>

  <!-- Kết quả Gacha -->
  <div class="result-overlay" id="resultOverlay">
    <div>
      <div class="result-grid" id="resultGrid"></div>
      <div style="text-align:center"><button class="result-close" onclick="document.getElementById('resultOverlay').classList.remove('active')">Đóng</button></div>
    </div>
  </div>

  <script>
    function toggleNavMenu() {
      document.getElementById('navDropdown').classList.toggle('open');
    }
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.nav-right-menu')) {
        document.getElementById('navDropdown').classList.remove('open');
      }
    });
  </script>

  <script type="module" src="points.js"></script>
  <script type="module" src="shop.js"></script>
</body>
</html>
