<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VTWorld – Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="chat.css"/>
</head>
<body>

  <canvas id="bg-canvas"></canvas>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <!-- ===== TOAST ===== -->
  <div id="toastContainer" style="position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none"></div>

  <!-- ===== MODAL XEM PROFILE NGƯỜI KHÁC ===== -->
  <div id="viewProfileModal" class="modal-overlay" onclick="closeViewProfile(event)">
    <div class="modal-box" style="max-width:360px">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
        <div id="vp-avatar" style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#a78bfa,#7c3aed);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:22px;color:#fff;flex-shrink:0">?</div>
        <div>
          <div id="vp-name" style="font-weight:800;font-size:18px;color:#e0f2fe"></div>
          <div id="vp-email" style="font-size:11px;color:#4a7a9b;margin-top:2px"></div>
        </div>
      </div>
      <div id="vp-action-area"></div>
      <button onclick="closeViewProfile()" style="margin-top:12px;width:100%;padding:9px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#7dd3fc;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700">Đóng</button>
    </div>
  </div>

  <!-- ===== CHAT PAGE ===== -->
  <div class="chat-page-wrap">

    <!-- SIDEBAR -->
    <div class="chat-sidebar" id="chatSidebar">
      <div class="chat-sidebar-header">
        <button class="chat-back-btn" onclick="window.location.href='index.html'">← Trang chủ</button>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
          <h2 style="font-size:17px;font-weight:800;color:#e0f2fe">💬 Tin nhắn</h2>
          <button id="tab-toggle-btn" onclick="switchTab('friends')" style="font-size:11px;padding:5px 11px;border-radius:20px;border:1px solid rgba(52,211,153,0.35);background:rgba(52,211,153,0.07);color:#34d399;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700">👥 Bạn bè</button>
        </div>
      </div>

      <!-- TAB: CHAT LIST -->
      <div id="tab-chat-panel" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
        <div class="chat-search-wrap">
          <input class="chat-search-input" id="chatSearchInput" placeholder="🔍 Tìm người..." oninput="filterContacts()"/>
        </div>
        <div class="chat-contact-list" id="chatContactList">
          <div class="chat-contact active" onclick="openConvo('__server__','🌐 Chat toàn server',null,'server')" id="contact-__server__">
            <div class="chat-contact-avatar" style="background:linear-gradient(135deg,#38bdf8,#0ea5e9);font-size:18px">🌐</div>
            <div class="chat-contact-info">
              <span class="chat-contact-name">Chat toàn server</span>
              <span class="chat-contact-preview">Mọi người đều thấy</span>
            </div>
          </div>
          <div id="friendsInChat"></div>
          <div id="allUsersInChat"></div>
        </div>
      </div>

      <!-- TAB: FRIENDS -->
      <div id="tab-friends-panel" style="display:none;flex-direction:column;flex:1;overflow:hidden">
        <div style="padding:10px 14px 4px;font-size:11px;color:#fbbf24;font-weight:700;text-transform:uppercase;letter-spacing:.5px">📨 Lời mời đến</div>
        <div id="friendRequestsList" style="padding:0 8px 4px;max-height:180px;overflow-y:auto;scrollbar-width:thin"></div>
        <div style="padding:10px 14px 4px;font-size:11px;color:#34d399;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-top:1px solid rgba(255,255,255,0.05)">✅ Bạn bè của bạn</div>
        <div id="myFriendsList" style="padding:0 8px;flex:1;overflow-y:auto;scrollbar-width:thin"></div>
      </div>
    </div>

    <!-- CỬA SỔ CHAT -->
    <div class="chat-window" id="chatWindow">
      <div class="chat-window-header">
        <button class="chat-win-back" onclick="backToSidebar()">←</button>
        <div class="chat-win-avatar" id="chatWinAvatar" style="background:linear-gradient(135deg,#38bdf8,#0ea5e9);font-size:18px;cursor:pointer" onclick="viewCurrentProfile()">🌐</div>
        <div class="chat-win-info" style="cursor:pointer" onclick="viewCurrentProfile()">
          <span class="chat-win-name" id="chatWinName">Chat toàn server</span>
          <span class="chat-win-status">● Online</span>
        </div>
      </div>
      <div class="chat-window-messages" id="chatWindowMessages">
        <div class="cwm-msg system-msg">👋 Chào mừng! Chọn cuộc trò chuyện để bắt đầu.</div>
      </div>
      <div class="chat-window-input-row">
        <input class="chat-window-input" id="chatWindowInput" placeholder="Nhập tin nhắn..." onkeydown="if(event.key==='Enter')sendWindowChat()"/>
        <button class="chat-window-send" onclick="sendWindowChat()">➤</button>
      </div>
    </div>

  </div>

  <!-- Firebase + Chat Logic -->
  <script type="module" src="chat.js"></script>

</body>
</html>
