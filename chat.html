<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"/>
  <title>VTWorld – Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="chat.css"/>
  <link rel="stylesheet" href="quests.css"/>
  <script type="module" src="quests.js"></script>
</head>
<body>

  <canvas id="bg-canvas"></canvas>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <!-- ===== TOAST ===== -->
  <div id="toastContainer" style="position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none"></div>

  <!-- ===== MODAL XEM PROFILE NGƯỜI KHÁC ===== -->
 <div id="viewProfileModal" class="modal-overlay" onclick="closeViewProfile(event)">
    <div class="modal-box" style="max-width:380px;padding:0;overflow:hidden">

      <!-- Banner + Avatar nhân vật -->
      <div style="background:linear-gradient(135deg,rgba(56,189,248,0.15),rgba(124,58,237,0.2));padding:24px 20px 16px;text-align:center;border-bottom:1px solid rgba(56,189,248,0.1)">
        <!-- Khung nhân vật (placeholder, sau này gắn hệ thống thay đồ) -->
        <div id="vp-character-frame" style="width:80px;height:80px;border-radius:50%;margin:0 auto 12px;border:3px solid rgba(56,189,248,0.4);background:linear-gradient(135deg,#a78bfa,#7c3aed);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900;color:#fff;position:relative">
          <span id="vp-avatar">?</span>
          <!-- Badge "avatar" sau này replace bằng ảnh nhân vật -->
          <div style="position:absolute;bottom:-2px;right:-2px;width:22px;height:22px;border-radius:50%;background:#0f172a;border:2px solid rgba(56,189,248,0.3);display:flex;align-items:center;justify-content:center;font-size:11px">🎮</div>
        </div>
        <div id="vp-name" style="font-weight:900;font-size:20px;color:#e0f2fe;margin-bottom:4px"></div>
        <div id="vp-email" style="font-size:11px;color:#4a7a9b"></div>
      </div>

      <!-- Stats -->
      <div style="display:flex;border-bottom:1px solid rgba(56,189,248,0.08)">
        <div style="flex:1;padding:14px;text-align:center;border-right:1px solid rgba(56,189,248,0.08)">
          <div id="vp-points" style="font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:#fbbf24">—</div>
          <div style="font-size:11px;color:#4a7a9b;font-weight:700;margin-top:3px">⭐ Điểm</div>
        </div>
        <div style="flex:1;padding:14px;text-align:center">
          <div id="vp-friends-count" style="font-family:'Orbitron',monospace;font-size:18px;font-weight:900;color:#34d399">—</div>
          <div style="font-size:11px;color:#4a7a9b;font-weight:700;margin-top:3px">👥 Bạn bè</div>
        </div>
      </div>

      <!-- Actions -->
      <div style="padding:16px">
        <div id="vp-action-area"></div>
        <button onclick="closeViewProfile()" style="margin-top:10px;width:100%;padding:9px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#7dd3fc;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700">Đóng</button>
      </div>
    </div>
  </div>

  <!-- ===== CHAT PAGE ===== -->
  <div class="chat-page-wrap">

    <!-- SIDEBAR -->
    <div class="chat-sidebar" id="chatSidebar">
      <div class="chat-sidebar-header">
        <button class="chat-back-btn" onclick="window.location.href='index.html'">← Trang chủ</button>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px">
          <h2 style="font-size:17px;font-weight:800;color:#e0f2fe">💬 Tin nhắn</h2>
          <button id="tab-toggle-btn" onclick="switchTab('friends')" style="font-size:11px;padding:5px 11px;border-radius:20px;border:1px solid rgba(52,211,153,0.35);background:rgba(52,211,153,0.07);color:#34d399;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700">👥 Bạn bè</button>
        </div>
      </div>

      <!-- TAB: CHAT LIST -->
      <div id="tab-chat-panel" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
        <div class="chat-search-wrap">
          <input class="chat-search-input" id="chatSearchInput" placeholder="🔍 Tìm người..." oninput="filterContacts()"/>
        </div>
        <div class="chat-contact-list" id="chatContactList">
          <div class="chat-contact active" onclick="openConvo('server','🌐 Chat toàn server',null,'server')" id="contact-__server__">
            <div class="chat-contact-avatar" style="background:linear-gradient(135deg,#38bdf8,#0ea5e9);font-size:18px">🌐</div>
            <div class="chat-contact-info">
              <span class="chat-contact-name">Chat toàn server</span>
              <span class="chat-contact-preview">Mọi người đều thấy</span>
            </div>
          </div>
          <div id="friendsInChat"></div>
          <div id="allUsersInChat"></div>
        </div>
      </div>

      <!-- TAB: FRIENDS -->
      <div id="tab-friends-panel" style="display:none;flex-direction:column;flex:1;overflow:hidden">
        <div style="padding:10px 14px 4px;font-size:11px;color:#fbbf24;font-weight:700;text-transform:uppercase;letter-spacing:.5px">📨 Lời mời đến</div>
        <div id="friendRequestsList" style="padding:0 8px 4px;max-height:180px;overflow-y:auto;scrollbar-width:thin"></div>
        <div style="padding:10px 14px 4px;font-size:11px;color:#34d399;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-top:1px solid rgba(255,255,255,0.05)">✅ Bạn bè của bạn</div>
        <div id="myFriendsList" style="padding:0 8px;flex:1;overflow-y:auto;scrollbar-width:thin"></div>
      </div>
    </div>

    <!-- CỬA SỔ CHAT -->
    <div class="chat-window" id="chatWindow">
      <div class="chat-window-header">
        <button class="chat-win-back" onclick="backToSidebar()">←</button>
        <div class="chat-win-avatar" id="chatWinAvatar" style="background:linear-gradient(135deg,#38bdf8,#0ea5e9);font-size:18px;cursor:pointer" onclick="goToProfile()">🌐</div>
        <div class="chat-win-info" style="cursor:pointer;flex:1" onclick="goToProfile()">
          <span class="chat-win-name" id="chatWinName">Chat toàn server</span>
          <span class="chat-win-status">● Online</span>
        </div>
        <!-- NÚT GỬI ĐIỂM (chỉ hiện khi chat với bạn bè) -->
        <button id="sendPointsBtn"
                onclick="sendPointsToCurrent()"
                title="Gửi điểm cho bạn này"
                style="display:none;padding:8px 14px;border-radius:20px;border:1px solid rgba(251,191,36,0.4);background:linear-gradient(135deg,rgba(251,191,36,0.15),rgba(245,158,11,0.1));color:#fbbf24;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;transition:all .2s">
          💸 Gửi điểm
        </button>
      </div>
      <div class="chat-window-messages" id="chatWindowMessages">
        <div class="cwm-msg system-msg">👋 Chào mừng! Chọn cuộc trò chuyện để bắt đầu.</div>
      </div>
      <div class="chat-window-input-row">
        <input class="chat-window-input" id="chatWindowInput" placeholder="Nhập tin nhắn..." onkeydown="if(event.key==='Enter')sendWindowChat()"/>
        <button class="chat-window-send" onclick="sendWindowChat()">➤</button>
      </div>
    </div>

  </div>

  <!-- Firebase + Chat Logic -->
  <script type="module" src="chat.js"></script>
  <!-- Tính năng gửi điểm -->
  <script type="module" src="send-points.js"></script>

  <!-- Glue: hiển thị nút gửi điểm khi mở DM với bạn bè -->
  <script>
    // Đi đến trang profile
    window.goToProfile = function() {
      const uid = window.currentConvoUid || null;
      if (!uid) return; // server chat, không có profile
      location.href = 'profile.html?uid=' + uid;
    };

    // Bao bọc openConvo gốc để cập nhật trạng thái nút "Gửi điểm"
    (function () {
      function refreshBtn() {
        const btn = document.getElementById('sendPointsBtn');
        if (!btn) return;
        // currentConvoUid được set trong chat.js (null nếu là server chat)
        const uid = window.currentConvoUid || null;
        const me  = window._currentUser || (window.firebase && firebase.auth && firebase.auth().currentUser);
        btn.style.display = (uid && (!me || uid !== me.uid)) ? 'inline-block' : 'none';
      }
      // Patch openConvo
      const tryPatch = setInterval(() => {
        if (typeof window.openConvo === 'function' && !window.openConvo.__patched) {
          const orig = window.openConvo;
          window.openConvo = function (uid, name, avatarChar, type) {
            const r = orig.apply(this, arguments);
            // Lưu lại vào window cho dễ truy cập
            window.currentConvoUid  = (type === 'server') ? null : uid;
            window.currentConvoName = name;
            refreshBtn();
            return r;
          };
          window.openConvo.__patched = true;
          clearInterval(tryPatch);
        }
      }, 200);
    })();

    window.sendPointsToCurrent = function () {
      const uid  = window.currentConvoUid;
      const name = window.currentConvoName || 'Người nhận';
      if (!uid) { window.showToast && window.showToast('⚠️ Chỉ gửi điểm khi chat riêng với bạn bè!', 'warn'); return; }
      window.openSendPointsModal && window.openSendPointsModal(uid, name);
    };
  </script>

</body>
</html>
