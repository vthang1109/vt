<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VTWorld — Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0f1a; color: #e0f2fe; font-family: 'Nunito', sans-serif; min-height: 100vh; }

    /* ===== NAV ===== */
    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 20px; background: rgba(4,20,40,0.9); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(56,189,248,0.15); position: sticky; top: 0; z-index: 100;
    }
    .logo { cursor: pointer; display: flex; align-items: baseline; gap: 2px; }
    .logo-vt { font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 900; color: #38bdf8; }
    .logo-world { font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 700; color: #7dd3fc; }
    .nav-right-menu { position: relative; }
    .nav-hamburger {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: #e2e8f0; font-size: 22px; width: 42px; height: 42px; border-radius: 10px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s;
    }
    .nav-hamburger:hover { background: rgba(56,189,248,0.1); border-color: rgba(56,189,248,0.3); }
    .nav-dropdown {
      position: absolute; top: 50px; right: 0; background: rgba(4,20,40,0.98);
      border: 1px solid rgba(56,189,248,0.25); border-radius: 16px; padding: 8px; min-width: 150px;
      display: none; flex-direction: column; gap: 2px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      z-index: 200; backdrop-filter: blur(16px);
    }
    .nav-dropdown.open { display: flex; animation: slideDown 0.2s ease both; }
    .nav-dropdown-item {
      display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: 10px;
      color: #e2e8f0; font-size: 14px; font-weight: 700; cursor: pointer; text-decoration: none;
      transition: all 0.2s; font-family: 'Nunito', sans-serif;
    }
    .nav-dropdown-item:hover { background: rgba(56,189,248,0.1); color: #38bdf8; }
    .dd-icon { font-size: 18px; width: 24px; text-align: center; }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== LAYOUT ===== */
    .admin-container { display: flex; height: calc(100vh - 56px); }

    /* Sidebar (danh sách người dùng) */
    .sidebar {
      width: 300px; background: #0f172a; border-right: 1px solid rgba(56,189,248,0.2);
      display: flex; flex-direction: column; flex-shrink: 0;
      transition: width 0.3s ease, padding 0.3s ease; overflow: hidden;
    }
    .sidebar.collapsed { width: 0; padding: 0; border-right: none; }
    .sidebar-header {
      padding: 16px; border-bottom: 1px solid rgba(56,189,248,0.1);
      display: flex; justify-content: space-between; align-items: center;
    }
    .sidebar-header h3 { font-family: 'Orbitron', sans-serif; font-size: 14px; color: #38bdf8; }
    .toggle-users-btn {
      background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.25);
      color: #38bdf8; padding: 6px 12px; border-radius: 8px; cursor: pointer;
      font-weight: 700; font-size: 12px; font-family: 'Nunito', sans-serif;
      white-space: nowrap; transition: all 0.2s;
    }
    .toggle-users-btn:hover { background: rgba(56,189,248,0.2); }
    .search-box {
      margin: 12px 16px; padding: 10px 14px; border-radius: 10px;
      border: 1px solid rgba(56,189,248,0.25); background: rgba(0,0,0,0.3);
      color: #e0f2fe; outline: none; font-size: 13px;
    }
    .user-list {
      flex: 1; overflow-y: auto; padding: 0 8px 8px; display: flex; flex-direction: column; gap: 4px;
    }
    .user-item {
      display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 10px;
      cursor: pointer; transition: background 0.2s; border: 1px solid transparent;
    }
    .user-item:hover { background: rgba(56,189,248,0.08); }
    .user-item.active { background: rgba(56,189,248,0.15); border-color: rgba(56,189,248,0.3); }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #0ea5e9, #38bdf8);
      display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; color: #fff;
      flex-shrink: 0; background-size: cover; background-position: center;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-weight: 700; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-email { font-size: 11px; color: #7dd3fc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-points { font-weight: 800; font-size: 13px; color: #fbbf24; }

    /* ===== POPUP MODAL ===== */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-card {
      background: #1e293b; border: 1px solid #38bdf8; border-radius: 20px;
      padding: 24px; width: 90%; max-width: 400px; text-align: center;
      box-shadow: 0 0 40px rgba(56,189,248,0.2);
    }
    .modal-avatar {
      width: 70px; height: 70px; border-radius: 50%;
      margin: 0 auto 16px; display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 800; color: #fff;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      background-size: cover; background-position: center;
    }
    .modal-name { font-size: 20px; font-weight: 800; }
    .modal-email { font-size: 13px; color: #7dd3fc; margin-bottom: 12px; }
    .modal-points { font-size: 36px; font-weight: 900; color: #fbbf24; font-family: 'Orbitron', sans-serif; margin: 10px 0; }
    .input-group { display: flex; gap: 8px; margin-top: 16px; }
    .input-group input {
      flex: 1; padding: 10px 14px; border-radius: 10px; border: 1px solid rgba(56,189,248,0.3);
      background: rgba(0,0,0,0.4); color: #fff; outline: none; font-size: 14px;
    }
    .btn-row { display: flex; gap: 8px; margin-top: 10px; }
    .btn {
      padding: 10px 18px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer;
      transition: all 0.2s; font-size: 13px; font-family: 'Nunito', sans-serif;
    }
    .btn-add { background: #10b981; color: white; flex: 1; }
    .btn-sub { background: #ef4444; color: white; flex: 1; }
    .btn-reset { background: #64748b; color: white; margin-top: 6px; width: 100%; }
    .btn:hover { opacity: 0.9; transform: scale(0.98); }
    .btn-close {
      background: none; border: 1px solid rgba(255,255,255,0.2);
      color: #e0f2fe; padding: 8px; border-radius: 8px; margin-top: 10px; width: 100%;
      font-weight: 700; cursor: pointer;
    }
  </style>
</head>
<body>
  <nav>
    <div class="logo" onclick="location.href='index.html'">
      <span class="logo-vt">VT</span><span class="logo-world">World</span>
    </div>
    <div class="nav-right-menu">
      <button class="nav-hamburger" onclick="toggleNavMenu()">☰</button>
      <div class="nav-dropdown" id="navDropdown">
        <a class="nav-dropdown-item" href="#" onclick="history.back(); return false;">
          <span class="dd-icon">←</span> Quay lại
        </a>
      </div>
    </div>
  </nav>

  <div class="admin-container">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3>👥 Người dùng</h3>
        <button class="toggle-users-btn" onclick="toggleSidebar()">Ẩn</button>
      </div>
      <input class="search-box" id="searchInput" placeholder="🔍 Tìm..." oninput="filterUsers()" />
      <div class="user-list" id="userList"></div>
    </div>

    <div class="main-panel" style="display: flex; align-items: center; justify-content: center; color: #4a7a9b; font-size: 18px;">
      👈 Chọn người dùng để xem chi tiết
    </div>
  </div>

  <!-- POPUP USER DETAIL -->
  <div class="modal-overlay" id="userModal">
    <div class="modal-card">
      <div class="modal-avatar" id="modalAvatar">?</div>
      <div class="modal-name" id="modalName">—</div>
      <div class="modal-email" id="modalEmail"></div>
      <div class="modal-points" id="modalPoints">0</div>
      <div class="input-group">
        <input type="number" id="modalPointsAmount" placeholder="Số điểm" />
      </div>
      <div class="btn-row">
        <button class="btn btn-add" onclick="adjustPoints(1)">+ CỘNG</button>
        <button class="btn btn-sub" onclick="adjustPoints(-1)">- TRỪ</button>
      </div>
      <button class="btn btn-reset" onclick="resetPoints()">RESET VỀ 0</button>
      <button class="btn-close" onclick="closeModal()">ĐÓNG</button>
    </div>
  </div>

  <script>
    function toggleNavMenu() {
      document.getElementById('navDropdown').classList.toggle('open');
    }
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.nav-right-menu')) {
        document.getElementById('navDropdown')?.classList.remove('open');
      }
    });
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('collapsed');
      const btn = sidebar.querySelector('.toggle-users-btn');
      if (btn) btn.textContent = sidebar.classList.contains('collapsed') ? 'Hiện' : 'Ẩn';
    }
    function closeModal() {
      document.getElementById('userModal').classList.remove('open');
    }
  </script>

  <script type="module">
    import { auth, db } from './points.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { collection, getDocs, doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const ADMIN_EMAIL = 'thang@game.com';
    let allUsers = [];
    window._selectedUserId = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = 'index.html'; return; }
      const userEmail = (user.email || '').trim().toLowerCase();
      if (userEmail !== ADMIN_EMAIL.trim().toLowerCase()) {
        alert('Bạn không có quyền truy cập Admin!');
        window.location.href = 'index.html';
        return;
      }
      loadUserList();
    });

    window.logout = async () => {
      await signOut(auth);
      window.location.href = 'index.html';
    };

    async function loadUserList() {
      const listEl = document.getElementById('userList');
      listEl.innerHTML = '<div style="color:#4a7a9b;text-align:center;padding:20px;">Đang tải...</div>';
      try {
        const snap = await getDocs(collection(db, 'users'));
        allUsers = [];
        snap.forEach(d => allUsers.push({ uid: d.id, ...d.data() }));
        renderUserList(allUsers);
      } catch(e) {
        listEl.innerHTML = '<div style="color:#ef4444;text-align:center;padding:20px;">Lỗi tải dữ liệu</div>';
      }
    }

    function renderUserList(users) {
      const listEl = document.getElementById('userList');
      if (!users.length) {
        listEl.innerHTML = '<div style="color:#4a7a9b;text-align:center;padding:20px;">Không có người dùng</div>';
        return;
      }
      listEl.innerHTML = users.map(u => {
        const name = u.nickname || u.displayName || (u.email ? u.email.split('@')[0] : 'Unknown');
        const avatarChar = name.charAt(0).toUpperCase();
        const avatarUrl = u.avatarUrl || '';
        return `
          <div class="user-item" data-uid="${u.uid}">
            <div class="user-avatar" style="${avatarUrl ? `background-image:url(${avatarUrl});background-size:cover;` : ''}">${avatarUrl ? '' : avatarChar}</div>
            <div class="user-info">
              <div class="user-name">${name}</div>
              <div class="user-email">${u.email || ''}</div>
            </div>
            <div class="user-points">${Number(u.points || 0).toLocaleString()}</div>
          </div>
        `;
      }).join('');

      document.querySelectorAll('.user-item').forEach(el => {
        el.addEventListener('click', () => openUserPopup(el.dataset.uid));
      });
    }

    window.filterUsers = function() {
      const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
      if (!keyword) { renderUserList(allUsers); return; }
      const filtered = allUsers.filter(u => {
        const name = u.nickname || u.displayName || (u.email ? u.email.split('@')[0] : '');
        return name.toLowerCase().includes(keyword) || (u.email && u.email.toLowerCase().includes(keyword));
      });
      renderUserList(filtered);
    };

    async function openUserPopup(uid) {
      window._selectedUserId = uid;
      // active class
      document.querySelectorAll('.user-item').forEach(el => el.classList.toggle('active', el.dataset.uid === uid));
      
      const userRef = doc(db, 'users', uid);
      const snap = await getDoc(userRef);
      if (!snap.exists()) return;
      const data = snap.data();
      const name = data.nickname || data.displayName || (data.email ? data.email.split('@')[0] : 'Unknown');
      
      document.getElementById('modalAvatar').textContent = name.charAt(0).toUpperCase();
      if (data.avatarUrl) {
        document.getElementById('modalAvatar').style.backgroundImage = `url(${data.avatarUrl})`;
        document.getElementById('modalAvatar').style.backgroundSize = 'cover';
        document.getElementById('modalAvatar').textContent = '';
      } else {
        document.getElementById('modalAvatar').style.backgroundImage = '';
      }
      document.getElementById('modalName').textContent = name;
      document.getElementById('modalEmail').textContent = data.email || '';
      document.getElementById('modalPoints').textContent = Number(data.points || 0).toLocaleString();
      document.getElementById('modalPointsAmount').value = '';
      
      document.getElementById('userModal').classList.add('open');
    }

    window.adjustPoints = async function(multiplier) {
      if (!window._selectedUserId) return alert('Chưa chọn người dùng!');
      const amt = parseInt(document.getElementById('modalPointsAmount').value);
      if (isNaN(amt) || amt <= 0) return alert('Nhập số điểm hợp lệ!');
      
      try {
        const userRef = doc(db, 'users', window._selectedUserId);
        const snap = await getDoc(userRef);
        let current = snap.exists() ? (snap.data().points || 0) : 0;
        let newTotal = current + (amt * multiplier);
        if (newTotal < 0) newTotal = 0;
        
        await updateDoc(userRef, { points: newTotal, lastAdminUpdate: serverTimestamp() });
        // Cập nhật lại điểm hiển thị
        document.getElementById('modalPoints').textContent = newTotal.toLocaleString();
        // Cập nhật điểm trong danh sách
        const userItem = document.querySelector(`.user-item[data-uid="${window._selectedUserId}"] .user-points`);
        if (userItem) userItem.textContent = newTotal.toLocaleString();
        document.getElementById('modalPointsAmount').value = '';
      } catch(e) { alert('Lỗi: ' + e.message); }
    };

    window.resetPoints = async function() {
      if (!window._selectedUserId) return;
      if (confirm('Reset điểm về 0?')) {
        await updateDoc(doc(db, 'users', window._selectedUserId), { points: 0 });
        document.getElementById('modalPoints').textContent = '0';
        const userItem = document.querySelector(`.user-item[data-uid="${window._selectedUserId}"] .user-points`);
        if (userItem) userItem.textContent = '0';
      }
    };

    window.closeModal = function() {
      document.getElementById('userModal').classList.remove('open');
    };
  </script>
</body>
</html>
